name: Build APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Set up Android SDK
        run: |
          # The runner already has cmdline-tools at /usr/local/lib/android/sdk
          ANDROID_HOME=/usr/local/lib/android/sdk
          echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$ANDROID_HOME" >> $GITHUB_ENV
          
          SDKMANAGER=$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager
          
          # Accept all licenses
          yes | $SDKMANAGER --licenses 2>&1 | tail -3
          
          # Install only what we need (skip emulator)
          yes | $SDKMANAGER "platforms;android-34" "build-tools;34.0.0" 2>&1 | tail -5

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew assembleRelease

      - name: Locate APK
        id: locate
        run: |
          ls -la app/build/outputs/apk/release/
          echo "apk_path=app/build/outputs/apk/release/app-release-unsigned.apk" >> $GITHUB_OUTPUT

      - name: Sign APK
        run: |
          keytool -genkey -v -keystore debug.keystore -alias androiddebugkey \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=Android Debug, O=Android, C=US"
          BT=$ANDROID_HOME/build-tools/34.0.0
          if [ ! -f "$BT/lib/apksigner.jar" ]; then
            BT=$(ls -d $ANDROID_HOME/build-tools/*/ | tail -1)
          fi
          echo "Using build-tools: $BT"
          java -jar "$BT/lib/apksigner.jar" sign \
            --ks debug.keystore --ks-pass pass:android \
            --ks-key-alias androiddebugkey --key-pass pass:android \
            --out app-release-signed.apk \
            ${{ steps.locate.outputs.apk_path }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: WebViewApp-APK
          path: app-release-signed.apk
